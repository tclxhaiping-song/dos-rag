server:
  port: 8080

spring:
  application:
    name: doc-qa-api
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  ai:
    openai:
      api-key: sk-5f462474768a41f58f02ce4b1910f34c     # 百炼平台 API Key，建议用环境变量
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      embedding:
        options:
          model: text-embedding-v3       # 百炼 Embedding 模型，1024 维
      chat:
        options:
          model: qwen-plus               # 百炼 Chat 模型（可换 qwen-turbo / qwen-max）
    vectorstore:
      milvus:
        initialize-schema: true
        collection-name: doc_qa_chunks_qw
        embedding-dimension: 1024        # text-embedding-v3 输出 1024 维
        metric-type: COSINE
        index-type: IVF_FLAT
        index-parameters: '{"nlist":1024}'
        client:
          host: localhost
          port: 19530
          username: root
          password: milvus

# 分块：CHAR = 固定字符窗口+重叠；SENTENCE = 按句号类标点切句再合并到上限长度
app:
  chunk:
    strategy: CHAR
    char-chunk-size: 800
    char-overlap: 120
    sentence-max-chars: 900
