server:
  port: 8080

spring:
  application:
    name: doc-qa-api
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  ai:
    openai:
      api-key: sk-5f462474768a41f58f02ce4b1910f34c     # 百炼平台 API Key，建议用环境变量
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      embedding:
        options:
          model: qwen3-vl-embedding       # 百炼 Embedding 模型，1024 维
      chat:
        options:
          model: qwen-plus               # 百炼 Chat 模型（可换 qwen-turbo / qwen-max）
    vectorstore:
      milvus:
        initialize-schema: true
        collection-name: doc_qa_chunks_qw
        embedding-dimension: 1024        # text-embedding-v3 输出 1024 维
        metric-type: COSINE
        index-type: IVF_FLAT
        index-parameters: '{"nlist":1024}'
        client:
          host: localhost
          port: 19530
          username: root
          password: milvus

# 分块策略：
#   CHAR          = 固定字符窗口 + 重叠
#   SENTENCE      = 按句号类标点切句再合并到上限长度
#   PARENT_CHILD  = 父子索引：大父块(1000字)提供上下文 + 小子块(100字)精准检索
app:
  chunk:
    strategy: PARENT_CHILD
    # --- CHAR 策略参数 ---
    char-chunk-size: 800
    char-overlap: 120
    # --- SENTENCE 策略参数 ---
    sentence-max-chars: 900
    # --- PARENT_CHILD 策略参数 ---
    parent-chunk-size: 1000       # 父块大小（字符），提供给大模型的完整上下文
    parent-overlap: 200           # 父块重叠区，防止语义在父块边界截断
    child-chunk-size: 100         # 子块大小（字符），存入 Milvus 做精准检索
    child-overlap: 20             # 子块重叠区
